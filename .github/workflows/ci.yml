name: ci
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run typecheck with diagnostic log
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ix3-first-ten-typecheck-2
          path: typecheck.log
      - run: npm test
      - run: npm run build
