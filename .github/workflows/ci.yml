# One-shot test split; restored after the test file is committed.
name: ci
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
      - name: Split the long combined semantic pressure test
        if: github.actor != 'github-actions[bot]'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts')
          s=p.read_text()
          label="recognizes kakikomi and ordered pon-chi-kan-ron from durable event history"
          start=s.index("  it('"+label+"', () => {")
          end=s.index('\n  }, 90_000);', start)+len('\n  }, 90_000);')
          block=s[start:end]
          body_start=block.index('() => {')+len('() => {')
          body_end=block.rfind('\n  },')
          body=block[body_start:body_end]
          split=body.index('\n    const sequenceActions')
          kakikomi=body[:split]
          sequence=body[split:]
          replacement=(
            "  it('recognizes kakikomi from the uninterrupted first-own-draw window', () => {"
            +kakikomi+"\n  }, 45_000);\n\n"
            +"  it('recognizes ordered pon-chi-kan-ron from durable event history', () => {"
            +sequence+"\n  }, 60_000);"
          )
          p.write_text(s[:start]+replacement+s[end:])
          PY
          path=packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=agent/ix3-local-yaku-first-ten" --jq .sha)
          content=$(base64 -w0 "$path")
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='Split ix3 semantic sequence pressure tests' \
            -f content="$content" \
            -f branch='agent/ix3-local-yaku-first-ten' \
            -f sha="$sha" >/dev/null
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
