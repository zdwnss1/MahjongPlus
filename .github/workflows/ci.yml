# One-shot verified test split; restored after the split commit is pushed.
name: ci
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
          fetch-depth: 0
      - name: Split independent semantic pressure claims
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts')
          s=p.read_text()
          nl=chr(10)
          label="recognizes kakikomi and ordered pon-chi-kan-ron from durable event history"
          start=s.index("  it('"+label+"', () => {")
          closing=nl+"  }, 90_000);"
          end=s.index(closing, start)+len(closing)
          block=s[start:end]
          body_start=block.index('() => {')+len('() => {')
          body_end=block.rfind(nl+"  },")
          body=block[body_start:body_end]
          split=body.index(nl+"    const sequenceActions")
          kakikomi=body[:split]
          sequence=body[split:]
          replacement=(
            "  it('recognizes kakikomi from the uninterrupted first-own-draw window', () => {"
            +kakikomi+nl+"  }, 45_000);"+nl+nl
            +"  it('recognizes ordered pon-chi-kan-ron from durable event history', () => {"
            +sequence+nl+"  }, 60_000);"
          )
          p.write_text(s[:start]+replacement+s[end:])
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Commit verified split
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts
          git commit -m 'Split independent ix3 temporal pressure tests'
          git push origin HEAD:agent/ix3-local-yaku-first-ten
