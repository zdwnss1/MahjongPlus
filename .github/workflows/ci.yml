name: ci
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - name: Capture tests
        id: tests
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          status=$?
          cat test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: readonly-partition-test-log
          path: test.log
      - name: Fail on test error
        if: steps.tests.outputs.status != '0'
        run: exit 1
      - run: npm run build
