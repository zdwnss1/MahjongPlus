name: fix-ix3-latest-revision
on:
  pull_request:
    branches: [agent/registered-yaku-evaluation]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
      - name: Replace remaining revision reference
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('packages/preset-riichi/src/ix3FirstTenLocalYaku.ts')
          s=p.read_text()
          if 'right: latestRevision' not in s: raise SystemExit('remaining reference not found')
          p.write_text(s.replace('right: latestRevision','right: previousRevision'))
          PY
          path=packages/preset-riichi/src/ix3FirstTenLocalYaku.ts
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=agent/ix3-local-yaku-first-ten" --jq .sha)
          content=$(base64 -w0 "$path")
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='Fix remaining pon-riichi revision reference' \
            -f content="$content" \
            -f branch='agent/ix3-local-yaku-first-ten' \
            -f sha="$sha" >/dev/null
