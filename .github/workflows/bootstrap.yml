name: bootstrap-source
on:
  push:
    branches: [main]
    paths:
      - source.part00
      - source.part01
      - source.part02
      - source.part03
      - .github/workflows/bootstrap.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand validated source tree
        run: |
          cat source.part00 source.part01 source.part02 source.part03 > /tmp/source.b64
          base64 --decode /tmp/source.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz
          rm -f source.part* bootstrap.part* bootstrap.tar.gz.b64
          rm -f .github/workflows/bootstrap.yml
      - name: Commit source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement playable MahjongPlus MVP"
          git push
