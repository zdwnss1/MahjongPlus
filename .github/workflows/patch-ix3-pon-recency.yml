name: patch-ix3-pon-recency
on:
  pull_request:
    branches: [agent/registered-yaku-evaluation]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
      - name: Patch source and test
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          source=Path('packages/preset-riichi/src/ix3FirstTenLocalYaku.ts')
          s=source.read_text()
          old="""const latestRevision = { kind: 'aggregate', operator: 'max', source: eventsExpression, as: 'event', value: { kind: 'path', target: { kind: 'variable', name: 'event' }, path: ['revision'] } };"""
          new="""const previousRevision = { kind: 'arithmetic', operator: 'subtract', left: { kind: 'variable', name: 'revision' }, right: { kind: 'literal', value: 1 } };"""
          if old in s:
              s=s.replace(old,new,1)
              s=s.replace('right: latestRevision,','right: previousRevision,',1)
          source.write_text(s)

          test=Path('packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts')
          t=test.read_text()
          old_test="""  const event = runtime.journal.all().findLast((entry) => entry.type === type && (!actorId || entry.actorId === actorId));"""
          new_test="""  const event = [...runtime.journal.all()].reverse().find((entry) => entry.type === type && (!actorId || entry.actorId === actorId));"""
          if old_test not in t: raise SystemExit('findLast call not found')
          test.write_text(t.replace(old_test,new_test,1))
          PY

          update_file() {
            path="$1"
            message="$2"
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=agent/ix3-local-yaku-first-ten" --jq .sha)
            content=$(base64 -w0 "$path")
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="$message" \
              -f content="$content" \
              -f branch='agent/ix3-local-yaku-first-ten' \
              -f sha="$sha" >/dev/null
          }
          update_file packages/preset-riichi/src/ix3FirstTenLocalYaku.ts 'Fix pon-riichi post-call recency'
          update_file packages/preset-riichi/test/ix3FirstTenLocalYaku.test.ts 'Use compatible reverse find in ix3 tests'
