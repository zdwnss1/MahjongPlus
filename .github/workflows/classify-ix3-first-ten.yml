# Temporary one-shot workflow; removed after the catalog patch is committed.
name: classify-ix3-first-ten
on:
  push:
    branches: [agent/ix3-local-yaku-first-ten]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
      - name: Add explicit catalog classifications
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('packages/preset-riichi/src/semanticCatalog.ts')
          s=p.read_text()
          marker="""\n};\n\nconst modules: SemanticModuleRecord[] = RIICHI_RULE_MODULE_ANALYSES.map"""
          addition="""
  'rule.ix3-first-ten-declarations': {
    status: 'fixture-only',
    layer: 'declaration-policy',
    integrationNotes: [
      'Pon-riichi, Hochi, Tsumo-sen and Bunbun declaration actions execute through independent ledger, declaration, privilege, source-policy and visibility facts.',
      'Hochi still requires a pre-win single-wait evidence relation and Bunbun still requires the production observation projection consumer.',
    ],
  },
  'service.ix3-first-ten-response-evaluation': {
    status: 'partial',
    layer: 'yaku-qualification',
    integrationNotes: [
      'Entries 1 and 6–10 consume normalized response interpretation, physical source and durable event history.',
      'Contextual dora values are expression-valued contributions and do not independently satisfy minimum-yaku qualification.',
    ],
  },
  'service.ix3-first-ten-direct-evaluation': {
    status: 'partial',
    layer: 'yaku-qualification',
    integrationNotes: [
      'Entries 1, 4, 5, 7, 8 and 10 consume the direct-source interpretation path.',
      'Pre-hand commitments and active dora faces are explicit profile data rather than hidden runtime state.',
    ],
  },
"""
          if "'rule.ix3-first-ten-declarations'" not in s:
              if marker not in s: raise SystemExit('module status marker not found')
              s=s.replace(marker,addition+marker,1)
          p.write_text(s)
          PY
          path=packages/preset-riichi/src/semanticCatalog.ts
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=agent/ix3-local-yaku-first-ten" --jq .sha)
          content=$(base64 -w0 "$path")
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='Classify ix3 first-ten modules in semantic catalog' \
            -f content="$content" \
            -f branch='agent/ix3-local-yaku-first-ten' \
            -f sha="$sha" >/dev/null
