name: patch-semantic-position-guard
on:
  pull_request:
    branches: [agent/registered-yaku-evaluation]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ix3-local-yaku-first-ten
      - name: Add explicit position guard
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('packages/world-language/src/semanticQuery.ts')
          s=p.read_text()
          marker="""  const zones = worldCollection('zones', profile, environment);"""
          replacement="""  if (condition.kind !== 'position') {
    throw new Error(`Unsupported semantic condition ${String((condition as { kind?: unknown }).kind)}.`);
  }

  const zones = worldCollection('zones', profile, environment);"""
          if replacement not in s:
              if marker not in s: raise SystemExit('position marker not found')
              s=s.replace(marker,replacement,1)
          p.write_text(s)
          PY
          path=packages/world-language/src/semanticQuery.ts
          sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=agent/ix3-local-yaku-first-ten" --jq .sha)
          content=$(base64 -w0 "$path")
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='Narrow semantic position conditions explicitly' \
            -f content="$content" \
            -f branch='agent/ix3-local-yaku-first-ten' \
            -f sha="$sha" >/dev/null
